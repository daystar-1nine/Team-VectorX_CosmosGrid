<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <style>
    .primary { fill: #00E5FF; transition: fill 0.3s ease; }
    .secondary { fill: #FFFFFF; transition: fill 0.3s ease; }
    
    @media (prefers-color-scheme: dark) {
      /* In dark mode, the entire stenciled logo becomes solid white for premium contrast */
      .primary { fill: #FFFFFF; }
    }
  </style>
  
  <!-- Top Orbital Gate -->
  <path class="primary" d="M 32 4 L 60 18 L 60 28 L 32 14 L 4 28 L 4 18 Z"/>
  
  <!-- Bottom Orbital Gate -->
  <path class="primary" d="M 32 60 L 4 46 L 4 36 L 32 50 L 60 36 L 60 46 Z"/>
  
  <!-- Quantum Command Core -->
  <path class="secondary" d="M 32 20 L 56 32 L 32 44 L 8 32 Z"/>
</svg>